services:
  mariadb:
    build: ./requirements/mariadb
    # Build the MariaDB image from the local Dockerfile
    image: mariadb
    # Name assigned to the built image
    container_name: mariadb
    # Explicit name for the running container
    env_file:
      - .env
    # Load environment variables from the .env file
    secrets:
      - db_password
      - db_root_password
    # Secrets containing sensitive database credentials
    volumes:
      - mariadb_data:/var/lib/mysql
    # Persist MariaDB data using a named volume
    networks:
      - inception
    # Connect the container to the custom Docker network
    restart: always
    # Automatically restart the container if it stops or crashes

  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    # Start this container after MariaDB
    # Note: this only controls startup order, not service readiness
    env_file:
      - .env
    secrets:
      - db_password
      - wp_password
      - wp_adm_password
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: always

  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    depends_on:
      - wordpress
    env_file:
      - .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    ports:
      - "443:443"
    # Expose HTTPS port 443 on the host and forward it to port 443 in the container
    restart: always

secrets:
  db_password:
    file: ../secrets/db_password
  db_root_password:
    file: ../secrets/db_root_password
  wp_password:
    file: ../secrets/wp_password
  wp_adm_password:
    file: ../secrets/wp_adm_password
  # Secret files containing passwords

volumes:
  mariadb_data:
    driver: local
    # Use the local volume driver
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/mariadb
    # Store MariaDB data on the host machine at /home/${LOGIN}/data/mariadb
    # This is still declared as a named volume in Docker Compose

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${LOGIN}/data/wordpress

networks:
  inception:
    driver: bridge
  # Create a custom bridge network for communication between containers