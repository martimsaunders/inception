events {}
# The events block is required by NGINX.
# It is used to configure connection processing settings.
# No custom event settings are needed for this project.

http {
	# Include the file that maps file extensions to MIME types
	include /etc/nginx/mime.types;

	# Fallback MIME type used when NGINX cannot determine the file type
	default_type application/octet-stream;

	# Enable efficient file transfer for static files
	sendfile on;

	# Keep client connections open for 65 seconds before closing them
	keepalive_timeout 65;

	server{
		# Listen on port 443 with SSL/TLS enabled
		listen 443 ssl;

		# Domain name used to access the website
		server_name mprazere.42.fr;

		# Path to the TLS certificate
		ssl_certificate /etc/nginx/ssl/inception.crt;

		# Path to the TLS private key
		ssl_certificate_key /etc/nginx/ssl/inception.key;

		# Restrict allowed TLS versions to 1.2 and 1.3 only, as required by the subject
		ssl_protocols TLSv1.2 TLSv1.3;

		# Root directory for the website files
		root /var/www/html;

		# Default files to serve when requesting a directory
		index index.php index.html index.htm;

		location / {
			# First try to serve the requested file or directory.
			# If it does not exist, forward the request to index.php with query parameters.
			# This is required for WordPress permalink support.
			try_files $uri $uri/ /index.php?$args;
		}

		location ~ \.php {
			# Include default FastCGI parameters required to pass the request correctly
			include fastcgi_params;

			# Forward PHP requests to the WordPress container running php-fpm on port 9000
			fastcgi_pass wordpress:9000;

			# Default PHP file to use when a directory is requested
			fastcgi_index index.php;

			# Tell php-fpm which PHP script file should be executed
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
		}

		location ~ /\.ht{
			# Deny access to hidden .ht* files such as .htaccess
			# These files are for Apache and should never be exposed by NGINX
			deny all;
		}
	}
}

